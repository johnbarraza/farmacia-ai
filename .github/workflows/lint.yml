name: lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python
        run: flake8 frontend/ backend/ ai/ --max-line-length=120 --ignore=E501,W503 --exclude=__pycache__
